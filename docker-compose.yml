services:
  db:
    image: postgres:latest
    environment:
      - POSTGRES_USER=hkrecruitment
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=hkrecruitment
    ports:
      - '5432:5432'


  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - '5173:5173'
    depends_on:
      - db

  api:
    build:
      context: .
      dockerfile: Dockerfile_copy
    env_file:
      - .env
    ports:
      - '3000:3000'
    depends_on:
      - db