name: DB

on:
  push:
    branches:
      - master
jobs:
  Run-Migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up JDK 11
        uses: actions/setup-java@v1
        with:
          java-version: 1.11
      - name: Install flyway
        run: |
          wget -qO- https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/8.2.2/flyway-commandline-8.2.2-linux-x64.tar.gz | tar xvz && sudo ln -s `pwd`/flyway-8.2.2/flyway /usr/local/bin
      - name: run migrations
        run: |
          flyway -configFiles=./api/migrations/flyway.conf -locations="filesystem:./api/migrations" migrate
        env:
          DB_HOST: ${{ secrets.HEROKU_DB_HOST }}
          DB_USER: ${{ secrets.HEROKU_DB_USER }}
          DB_PASSWORD: ${{ secrets.HEROKU_DB_PASSWORD }}
          DB_NAME: ${{ secrets.HEROKU_DB_NAME }}
