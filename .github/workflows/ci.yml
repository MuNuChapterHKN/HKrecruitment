name: CI
on: [pull_request]
jobs:
  Build-Backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: '14'
      - run: npm install
        working-directory: ./hkrecruitment-apiserver
      - run: npm test
        working-directory: ./hkrecruitment-apiserver
